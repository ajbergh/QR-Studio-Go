name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-static:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --silent
      - name: Strict TypeScript check
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-typecheck-log
          path: frontend/typecheck.log
          if-no-files-found: error
      - name: Enforce TypeScript result
        if: steps.typecheck.outcome == 'failure'
        run: cat typecheck.log && exit 1
      - name: Payload unit tests
        run: npm run test:unit
      - name: Production web build
        run: npm run build:web
      - name: Dependency audit
        id: audit
        continue-on-error: true
        run: npm audit --json > npm-audit.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-npm-audit
          path: frontend/npm-audit.json
          if-no-files-found: error
      - name: Enforce high-severity dependency audit
        if: steps.audit.outcome == 'failure'
        run: |
          node -e "const report=require('./npm-audit.json'); const counts=report.metadata?.vulnerabilities||{}; if ((counts.high||0)+(counts.critical||0)>0) { console.error(JSON.stringify(report,null,2)); process.exit(1); }"

  frontend-e2e:
    needs: frontend-static
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --silent
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-evidence
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - name: Go tests
        id: gotest
        continue-on-error: true
        run: go test ./... > go-test.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-go-test-log
          path: go-test.log
          if-no-files-found: error
      - name: Enforce Go test result
        if: steps.gotest.outcome == 'failure'
        run: cat go-test.log && exit 1
      - run: go vet ./...
      - name: Go vulnerability scan
        id: govuln
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -json ./... > govulncheck.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-govulncheck
          path: govulncheck.json
          if-no-files-found: error
      - name: Enforce Go vulnerability result
        if: steps.govuln.outcome == 'failure'
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  build-windows:
    needs: [frontend-static]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --silent
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Build Windows application
        run: wails build -clean -platform windows/amd64
      - uses: actions/upload-artifact@v4
        with:
          name: qr-studio-windows-amd64
          path: build/bin/QRStudio.exe
          if-no-files-found: error
